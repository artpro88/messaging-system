# Root fly.toml that delegates to backend's fly.toml\n# This ensures Fly.io can find the Dockerfile when deploying from repo root\n\napp = \"messaging-system-backend\"\nprimary_region = \"lhr\"\n\n[build]\n  dockerfile = \"backend/Dockerfile\"\n\n[env]\n  NODE_ENV = \"production\"\n\n[[services]]\n  protocol = \"tcp\"\n  internal_port = 3000\n  processes = [\"app\"]\n\n  [[services.ports]]\n    port = 80\n    handlers = [\"http\"]\n    force_https = true\n\n  [[services.ports]]\n    port = 443\n    handlers = [\"tls\", \"http\"]\n\n  [services.concurrency]\n    type = \"connections\"\n    hard_limit = 25\n    soft_limit = 20\n\n  [[services.tcp_checks]]\n    interval = 15000\n    timeout = 5000\n    grace_period = \"10s\"\n\n[checks]\n  [checks.alive]\n    type = \"http\"\n    interval = 10000\n    timeout = 5000\n    grace_period = \"30s\"\n    method = \"GET\"\n    path = \"/health\"\n"}
